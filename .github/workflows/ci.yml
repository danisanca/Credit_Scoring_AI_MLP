name: CI — Credit Scoring AI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Job 1: Testes do AI Service (Python)
  # ===========================================================================
  test-ai-service:
    name: Testes Python — AI Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        working-directory: ai-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Gerar dataset sintetico
        working-directory: ai-service
        run: python data/generate_data.py

      - name: Rodar testes com pytest
        working-directory: ai-service
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=60

  # ===========================================================================
  # Job 2: Build e Lint do Frontend (Angular)
  # ===========================================================================
  build-frontend:
    name: Build — Angular Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de producao
        working-directory: frontend
        run: npm run build -- --configuration production

      # Comenteado ate que testes unitarios sejam implementados:
      # - name: Rodar testes
      #   working-directory: frontend
      #   run: npm run test -- --watch=false --browsers=ChromeHeadless

  # ===========================================================================
  # Job 3: Build do Backend (.NET)
  # ===========================================================================
  build-backend:
    name: Build — .NET Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar pacotes
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - name: Format check (dotnet format)
        working-directory: backend
        run: dotnet format --verify-no-changes

      # Comenteado ate que testes unitarios sejam implementados:
      # - name: Testes
      #   working-directory: backend
      #   run: dotnet test --no-build --verbosity normal

  # ===========================================================================
  # Job 4: Build das imagens Docker
  # ===========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-ai-service, build-frontend, build-backend]

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend
        run: docker build -f frontend/Dockerfile ./frontend

      - name: Build Backend
        run: docker build -f backend/Dockerfile ./backend

      - name: Build AI Service
        run: docker build -f ai-service/Dockerfile ./ai-service
